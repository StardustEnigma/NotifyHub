version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: notifyhub-postgres
    environment:
      POSTGRES_DB: notifyhub
      POSTGRES_USER: notifyhub
      POSTGRES_PASSWORD: notifyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notifyhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notifyhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - notifyhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  notifyhub-network:
    driver: bridge
