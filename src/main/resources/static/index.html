<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NotifyHub — Real-time notification system powered by Spring Boot, Redis Pub/Sub, and WebSocket">
    <title>NotifyHub — Real-time Notifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>NotifyHub</h1>
                    <span class="brand-sub">Real-time Notifications</span>
                </div>
            </div>

            <div class="sidebar-section">
                <span class="section-label">Compose</span>
                <form id="notificationForm" class="compose-form">
                    <div class="form-field">
                        <label for="recipientId">Recipient</label>
                        <div class="select-wrapper">
                            <select id="recipientId" required>
                                <option value="">Select recipient…</option>
                                <option value="alice">Alice</option>
                                <option value="bob">Bob</option>
                                <option value="charlie">Charlie</option>
                            </select>
                            <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                    <div class="form-field">
                        <label for="notifTitle">Title</label>
                        <input type="text" id="notifTitle" placeholder="Notification title…" required maxlength="255">
                    </div>
                    <div class="form-field">
                        <label for="notifMessage">Message</label>
                        <textarea id="notifMessage" placeholder="Write your message…" required maxlength="1000" rows="3"></textarea>
                    </div>
                    <div class="form-field">
                        <label>Type</label>
                        <div class="type-selector">
                            <input type="radio" id="typeInfo" name="notifType" value="INFO" checked>
                            <label for="typeInfo" class="type-chip type-info">
                                <span class="chip-dot"></span>Info
                            </label>

                            <input type="radio" id="typeSuccess" name="notifType" value="SUCCESS">
                            <label for="typeSuccess" class="type-chip type-success">
                                <span class="chip-dot"></span>Success
                            </label>

                            <input type="radio" id="typeWarning" name="notifType" value="WARNING">
                            <label for="typeWarning" class="type-chip type-warning">
                                <span class="chip-dot"></span>Warning
                            </label>

                            <input type="radio" id="typeError" name="notifType" value="ERROR">
                            <label for="typeError" class="type-chip type-error">
                                <span class="chip-dot"></span>Error
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn-send" id="btnSend">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        Send Notification
                    </button>
                </form>
            </div>

            <div class="sidebar-footer">
                <div class="user-avatar" id="userAvatarDisplay">A</div>
                <div class="user-meta">
                    <span class="user-label">Viewing as</span>
                    <select id="currentUser" class="user-select">
                        <option value="alice">Alice</option>
                        <option value="bob">Bob</option>
                        <option value="charlie">Charlie</option>
                    </select>
                </div>
                <div class="connection-indicator" id="connectionStatus" title="Connecting…">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting…</span>
                </div>
            </div>
        </aside>

        <!-- Mobile Header (shown on small screens) -->
        <header class="mobile-header">
            <button class="btn-menu" id="btnMenuToggle" aria-label="Toggle sidebar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="mobile-brand">NotifyHub</h1>
            <div class="connection-indicator mobile-status" id="connectionStatusMobile">
                <span class="status-dot"></span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-area">
            <div class="main-topbar">
                <div class="topbar-left">
                    <h2 class="page-title">Notifications</h2>
                    <span class="unread-badge" id="unreadBadge" style="display: none;">0</span>
                </div>
                <div class="topbar-actions">
                    <div class="filter-pills">
                        <button class="pill active" data-filter="all">All</button>
                        <button class="pill" data-filter="unread">Unread</button>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-icon" id="btnRefresh" title="Refresh notifications">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                            </svg>
                        </button>
                        <button class="btn-icon" id="btnMarkAllRead" title="Mark all as read">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 11 12 14 22 4"/>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="notification-feed" id="notificationList">
                <div class="empty-state" id="emptyState">
                    <div class="empty-illustration">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                    </div>
                    <p class="empty-title">No notifications yet</p>
                    <span class="empty-desc">Compose one from the sidebar to get started.</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
