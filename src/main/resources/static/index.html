<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NotifyHub - Real-time notification system powered by Spring Boot, Redis Pub/Sub, and WebSocket">
    <title>NotifyHub — Real-time Notifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <h1>NotifyHub</h1>
                </div>
                <span class="header-tagline">Real-time Notification System</span>
            </div>
            <div class="header-right">
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
                <div class="user-selector">
                    <label for="currentUser">Viewing as:</label>
                    <select id="currentUser">
                        <option value="alice">Alice</option>
                        <option value="bob">Bob</option>
                        <option value="charlie">Charlie</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Panel: Send Notification -->
            <section class="panel send-panel">
                <div class="panel-header">
                    <h2>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-icon">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        Send Notification
                    </h2>
                </div>
                <form id="notificationForm" class="notification-form">
                    <div class="form-group">
                        <label for="recipientId">Recipient</label>
                        <select id="recipientId" required>
                            <option value="">Select recipient...</option>
                            <option value="alice">Alice</option>
                            <option value="bob">Bob</option>
                            <option value="charlie">Charlie</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="notifTitle">Title</label>
                        <input type="text" id="notifTitle" placeholder="Notification title..." required maxlength="255">
                    </div>
                    <div class="form-group">
                        <label for="notifMessage">Message</label>
                        <textarea id="notifMessage" placeholder="Write your message..." required maxlength="1000" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="notifType">Type</label>
                        <div class="type-selector">
                            <input type="radio" id="typeInfo" name="notifType" value="INFO" checked>
                            <label for="typeInfo" class="type-badge type-info">Info</label>

                            <input type="radio" id="typeSuccess" name="notifType" value="SUCCESS">
                            <label for="typeSuccess" class="type-badge type-success">Success</label>

                            <input type="radio" id="typeWarning" name="notifType" value="WARNING">
                            <label for="typeWarning" class="type-badge type-warning">Warning</label>

                            <input type="radio" id="typeError" name="notifType" value="ERROR">
                            <label for="typeError" class="type-badge type-error">Error</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-send" id="btnSend">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        Send Notification
                    </button>
                </form>
            </section>

            <!-- Right Panel: Notification Feed -->
            <section class="panel feed-panel">
                <div class="panel-header">
                    <h2>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-icon">
                            <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/>
                        </svg>
                        Notifications
                        <span class="unread-badge" id="unreadBadge" style="display: none;">0</span>
                    </h2>
                    <div class="feed-actions">
                        <button class="btn-secondary" id="btnRefresh" title="Refresh">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                            </svg>
                        </button>
                        <button class="btn-secondary" id="btnMarkAllRead" title="Mark all as read">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 11 12 14 22 4"/>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                            </svg>
                        </button>
                        <div class="filter-group">
                            <button class="btn-filter active" data-filter="all">All</button>
                            <button class="btn-filter" data-filter="unread">Unread</button>
                        </div>
                    </div>
                </div>
                <div class="notification-list" id="notificationList">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="empty-icon">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <p>No notifications yet</p>
                        <span>Send one from the panel on the left!</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
